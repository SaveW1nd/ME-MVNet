model_pe:
  n_samples: 4000
  nf_values: [0, 1, 2, 3]

  raw_branch:
    stem_channels: [64, 128]
    transformer_layers: 1
    transformer_heads: 4
    dropout: 0.1

  tf_branch:
    n_fft: 256
    hop_length: 64
    win_length: 256
    channels: [32, 64, 128]

  mech_branch:
    feature_dim: 32
    hidden_dim: 64

  gate_head:
    hidden_dim: 64

  gateformer:
    d_model: 128
    num_layers: 2
    num_heads: 4
    ff_mult: 2
    dropout: 0.1
    max_seq_len: 1024
    head_hidden_dim: 128
