mode: smoke
data:
  dataset:
    name: cisrj_seppe_v1
    output_dir: data/raw/cisrj_seppe_v1
    seed: 20260304
  signal:
    fs: 100000000.0
    tp: 1.5e-05
    pri: 4.0e-05
    b: 10000000.0
    n: 4000
  grid:
    nf_values:
    - 1
    - 2
    - 3
    tl_us_min: 1.0
    tl_us_max: 3.0
    jnr_db_min: -10.0
    jnr_db_max: 20.0
    k_active_dual_ratio: 0.5
  background:
    echo_snr_db: 0.0
    noise_power: 1.0
  split:
    train: 5000
    val: 1000
    test: 1000
  sanity:
    ts_tl_eps: 1e-6
model_sep:
  model_sep:
    n_samples: 4000
    encoder_channels: 128
    encoder_kernel: 16
    encoder_stride: 4
    tcn_blocks: 6
    tcn_dilation_cycle: 3
    tcn_dropout: 0.1
model_pe:
  model_pe:
    n_samples: 4000
    nf_values:
    - 0
    - 1
    - 2
    - 3
    raw_branch:
      stem_channels:
      - 64
      - 128
      transformer_layers: 1
      transformer_heads: 4
      dropout: 0.1
    tf_branch:
      n_fft: 256
      hop_length: 64
      win_length: 256
      channels:
      - 32
      - 64
      - 128
    mech_branch:
      feature_dim: 32
      hidden_dim: 64
    gate_head:
      hidden_dim: 64
    fusion:
      hidden_dim: 128
train_joint:
  train_joint:
    seed: 20260304
    batch_size: 48
    num_workers: 0
    epochs_smoke: 3
    epochs_formal: 80
    lr_sep: 0.0003
    lr_pe: 0.001
    weight_decay: 0.0001
    grad_clip: 5.0
    early_stop_patience: 12
    amp: true
    device: auto
  loss:
    w_sep: 1.0
    w_param: 0.5
    w_gate: 0.2
init_sep_ckpt: runs/exp_sep_smoke_v1/checkpoints/best.pt
