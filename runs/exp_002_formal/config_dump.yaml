mode: formal
data:
  dataset:
    name: isrj_single_dataset_v1
    output_dir: data/raw/isrj_single_dataset_v1
    seed: 20260303
  signal:
    fs: 40000000.0
    tp: 0.0001
    b: 10000000.0
    n: 4000
  grid:
    nf_list:
    - 1
    - 2
    - 4
    jnr_db_start: -10
    jnr_db_stop: 28
    jnr_db_step: 2
    nl_points_per_nf: 25
    nl_min_nf12: 200
    nl_max_nf12: 1000
    nl_min_nf4: 200
    nl_max_nf4: 800
    mc_repeats: 4
  split:
    train: 0.7
    val: 0.15
    test: 0.15
  sanity:
    tf_tl_eps: 1e-6
model:
  model:
    n_samples: 4000
    nf_values:
    - 1
    - 2
    - 4
    raw_branch:
      stem_channels:
      - 64
      - 128
      transformer_layers: 1
      transformer_heads: 4
      dropout: 0.1
    tf_branch:
      n_fft: 256
      hop_length: 64
      win_length: 256
      channels:
      - 32
      - 64
      - 128
    mech_branch:
      feature_dim: 32
      hidden_dim: 64
    fusion:
      hidden_dim: 128
    mask_head:
      hidden_dim: 64
train:
  train:
    seed: 20260303
    batch_size: 64
    num_workers: 0
    epochs_smoke: 3
    epochs_formal: 60
    lr: 0.001
    weight_decay: 0.0001
    grad_clip: 5.0
    early_stop_patience: 12
    amp: true
    device: auto
    print_every: 20
  loss:
    w_tl: 1.0
    w_tf: 1.0
    w_nf: 1.0
    w_mask: 0.5
    w_phy: 0.2
    mask_warmup_epochs: 3
